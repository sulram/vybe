name: Release

# Cut a release by pushing a tag:  git tag v0.0.2 && git push origin v0.0.2
# (bump the Cargo.toml version first — the tag must match it.)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: publish to crates.io + GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # System libraries winit / wgpu / egui-winit link against on Linux
      # (cargo test and the publish verify-build compile the crate).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libx11-dev \
            libxrandr-dev libxi-dev libxcursor-dev libgl1-mesa-dev

      # Guard: the tag (v0.0.2) must equal the Cargo.toml version (0.0.2),
      # so a release can never ship a mislabeled version.
      - name: Tag must match Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "tag=$tag  cargo.toml=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Test
        run: cargo test --all-features

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
